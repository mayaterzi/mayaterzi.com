<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maya Terzi</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --white:  #ffffff;
  --ink:    #0e0e0e;
  --accent: #e67d43;
  --pad:    48px;
}

html, body { height: 100%; }

body {
  background: var(--ink);
  color: var(--white);
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  overflow: hidden;
}

/* ─── NAV ─── */
nav {
  position: relative; z-index: 10;
  display: flex; justify-content: space-between; align-items: center;
  padding: 24px var(--pad);
}
.n-logo {
  font-size: 11px; font-weight: 500;
  letter-spacing: .18em; text-transform: uppercase;
  color: var(--white); text-decoration: none;
}
.n-links { display: flex; gap: 40px; }
.n-link {
  font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
  color: var(--white); text-decoration: none; opacity: .45;
  transition: opacity .15s;
}
.n-link:hover { opacity: 1; }

/* ─── HERO ─── */
#hero {
  position: relative;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.hero-bg {
  position: absolute; inset: 0; z-index: 0;
}
.hero-bg img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.hero-veil {
  position: absolute; inset: 0; z-index: 1;
  background: rgba(10,10,10,.55);
}

nav { flex-shrink: 0; }

.hero-content {
  position: relative; z-index: 5;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.cat-stack {
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  justify-content: center;
  gap: 80px;
}

.cat-item {
  display: flex;
  flex-direction: column;
  gap: 12px;
  text-decoration: none;
  color: var(--white);
  transition: color .3s ease;
  white-space: nowrap;
}
.cat-item:hover { color: var(--accent); }

.cat-num {
  font-size: 10px; font-weight: 400;
  letter-spacing: .22em;
  opacity: .4;
  transition: opacity .3s;
}
.cat-item:hover .cat-num { opacity: 1; }

.cat-title {
  font-family: 'EB Garamond', serif;
  font-size: clamp(3rem, 7vw, 7rem);
  font-weight: 400; line-height: 1;
  letter-spacing: -.02em;
  white-space: nowrap;
}

/* ─── MOBILE ─── */
@media (max-width: 768px) {
  :root { --pad: 20px; }
  .cat-stack { gap: 32px; flex-direction: column; align-items: flex-start; padding: 0 var(--pad); }
  .cat-title { font-size: clamp(2.4rem, 11vw, 7rem); }
  .n-links .n-link:not(:last-child) { display: none; }
}
</style>
</head>
<body>

<section id="hero">
  <div class="hero-bg">
    <img src="hero.png"
         alt="" onerror="this.style.display='none'">
  </div>
  <div class="hero-veil"></div>

  <nav>
    <a href="index.html" class="n-logo">Maya Terzi</a>
    <div class="n-links">
      <a href="projects.html" class="n-link">Projects</a>
      <a href="about.html" class="n-link">About</a>
      <a href="contact.html" class="n-link">Contact</a>
    </div>
  </nav>

  <div class="hero-content">
    <div class="cat-stack">
      <a class="cat-item" href="projects.html">
        <span class="cat-num">01</span>
        <span class="cat-title">Creative Direction</span>
      </a>
      <a class="cat-item" href="about.html">
        <span class="cat-num">02</span>
        <span class="cat-title">Maya Terzi</span>
      </a>
    </div>
  </div>
</section>

</body>
</html>
