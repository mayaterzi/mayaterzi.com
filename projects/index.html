<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --white:  #ffffff;
  --ink:    #0e0e0e;
  --accent: #e67d43;
  --pad:    48px;
  --gap:    3px;
}

body {
  background: var(--ink);
  color: var(--white);
  font-family: 'Inter', sans-serif;
  font-weight: 300;
}

/* ─── NAV ─── */
nav {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px var(--pad);
  background: transparent;
}
.n-logo {
  font-size: 11px; font-weight: 500;
  letter-spacing: .18em; text-transform: uppercase;
  color: var(--white); text-decoration: none;
}
.n-links { display: flex; gap: 36px; }
.n-link {
  font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--white); text-decoration: none; opacity: .45;
  transition: opacity .15s;
}
.n-link:hover { opacity: 1; }
.n-link.active { opacity: 1; color: var(--accent); }

/* ─── GRID ─── */
.proj-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  background: var(--ink);
  width: 100%;
}

.gi {
  position: relative;
  overflow: hidden;
  background: #1a1a1a;
}

/* ratio shims */
.gi::before { content: ''; display: block; }
.gi.r-sq::before   { padding-top: 100%; }   /* 1:1  */
.gi.r-tall::before { padding-top: 125%; }   /* 4:5  */

/* 2-col span — sits across 2 of the 3 columns */
.gi.span-2 { grid-column: span 2; }
.gi.span-2.r-sq::before   { padding-top: 50%; }   /* 2:1  */
.gi.span-2.r-tall::before { padding-top: 62.5%; } /* 8:5  */

/* 3-col span — full width */
.gi.span-3 { grid-column: span 3; }
.gi.span-3.r-sq::before   { padding-top: 33.33%; }
.gi.span-3.r-tall::before { padding-top: 41.67%; }

.gi a {
  position: absolute; inset: 0;
  display: block;
  text-decoration: none;
  color: inherit;
}

.gi img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  transition: transform .7s cubic-bezier(.23,1,.32,1), filter .5s;
  filter: brightness(.9);
}
.gi:hover img {
  transform: scale(1.05);
  filter: brightness(.4);
}

.gi-info {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  justify-content: flex-end;
  padding: 20px 18px;
  opacity: 0;
  transition: opacity .3s cubic-bezier(.23,1,.32,1);
  pointer-events: none;
  z-index: 2;
}
.gi:hover .gi-info { opacity: 1; }

.gi-num {
  font-size: 10px; letter-spacing: .2em;
  color: var(--accent); margin-bottom: 6px;
}
.gi-title {
  font-family: 'EB Garamond', serif;
  font-size: clamp(1rem, 1.8vw, 1.8rem);
  font-weight: 400; line-height: 1.05;
  color: var(--white); margin-bottom: 6px;
}
.gi-role {
  font-size: 10px; letter-spacing: .15em;
  text-transform: uppercase;
  color: rgba(255,255,255,.5);
}

/* ─── MOBILE ─── */
@media (max-width: 640px) {

  :root {
    --pad: 20px;
  }

  .proj-grid {
    grid-template-columns: 1fr;
    gap: 0;
  }

  /* Every project becomes full width */
  .gi,
  .gi.span-2,
  .gi.span-3 {
    grid-column: span 1;
  }

  /* Every project gets the same aspect ratio */
  .gi::before,
  .gi.span-2::before,
  .gi.span-3::before {
    padding-top: 125% !important;   /* 4:5 ratio */
  }

  /* Except Black Ivy */
  .black-ivy {
    grid-column: span 1;
  }

  .black-ivy::before {
    padding-top: 60% !important;
  }

}
